version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: als_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: als_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: als_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - model-data:/app/saved_models
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEMO_AUTH_BYPASS_ENABLED: ${DEMO_AUTH_BYPASS_ENABLED:-true}
      DEMO_LOGIN_EMAILS: ${DEMO_LOGIN_EMAILS:-admin@example.com,student@example.com}
      DEMO_SIGNUP_EMAIL_DOMAIN: ${DEMO_SIGNUP_EMAIL_DOMAIN:-demo.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: als_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - model-data:/app/saved_models
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEMO_AUTH_BYPASS_ENABLED: ${DEMO_AUTH_BYPASS_ENABLED:-true}
      DEMO_LOGIN_EMAILS: ${DEMO_LOGIN_EMAILS:-admin@example.com,student@example.com}
      DEMO_SIGNUP_EMAIL_DOMAIN: ${DEMO_SIGNUP_EMAIL_DOMAIN:-demo.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: als_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    networks:
      - app-network

volumes:
  postgres-data:
  model-data:

networks:
  app-network:
    driver: bridge
