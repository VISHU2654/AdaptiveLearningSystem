databases:
  - name: als-db
    databaseName: learning_db
    user: admin
    plan: free

services:
  - type: web
    name: als-api
    env: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && bash render_start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: als-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_AUTH_BYPASS_ENABLED
        value: "true"
