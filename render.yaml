databases:
  - name: als-db
    databaseName: learning_db
    user: admin
    plan: free

services:
  - type: redis
    name: als-redis
    plan: free # Note: Render free tier redis is not officially listed anymore, might require starter
    ipAllowList: []

  - type: web
    name: als-api
    env: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && bash render_start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: als-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: als-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_AUTH_BYPASS_ENABLED
        value: "true"

  - type: worker
    name: als-celery
    env: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && bash render_worker.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: als-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: als-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_AUTH_BYPASS_ENABLED
        value: "true"
